name: Release Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop runtime
        run: npm run build:desktop

      - name: Build macOS package
        run: npm run desktop:dist:mac

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            desktop/release/LanDrop-Clip-mac-arm64.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop runtime
        run: npm run build:desktop

      - name: Build Windows packages
        run: npm run desktop:dist:win

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            desktop/release-builder/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop runtime
        run: npm run build:desktop

      - name: Build Linux packages
        run: npm run desktop:dist:linux

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            desktop/release-builder/*.AppImage
          if-no-files-found: error

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension release package
        run: npm run release:extension

      - name: Upload extension release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-extension
          path: |
            extension/release/*.zip
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux
      - build-extension
    steps:
      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets/macos

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-assets/linux

      - name: Download extension asset
        uses: actions/download-artifact@v4
        with:
          name: release-extension
          path: release-assets/extension

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LanDrop Clip ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/macos/*
            release-assets/windows/*
            release-assets/linux/*
            release-assets/extension/*
